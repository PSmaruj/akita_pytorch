name: Qodana

on:
  push:
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2024.1
        with:
          linter: jetbrains/qodana-python-community:2024.1
          args: --save-report
