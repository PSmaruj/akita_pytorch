name: Qodana

on:
  push:
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2024.2
        with:
          linter: jetbrains/qodana-python-community:2024.2
          args: --save-report --results-dir qodana-results
      
      - name: Upload Qodana report
        uses: actions/upload-artifact@v4
        with:
          name: qodana-report
          path: qodana-results/report
